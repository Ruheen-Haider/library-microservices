server:
  port: 8080

spring:
  cloud:
    gateway:

      globalcors:
        add-to-simple-url-handler-mapping: true

        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/auth/**

        - id: library-service
          uri: http://library-service:8082
          predicates:
            - Path=/books/**

        - id: borrow-service
          uri: http://borrow-service:8083
          predicates:
            - Path=/borrow/**