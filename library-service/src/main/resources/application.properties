spring.application.name=library-service

server.port=8082
spring.datasource.url=jdbc:sqlserver://library-server.database.windows.net:1433;database=librarydb;encrypt=true;trustServerCertificate=true;loginTimeout=30;

spring.datasource.username=adminuser
spring.datasource.password=Library@123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration