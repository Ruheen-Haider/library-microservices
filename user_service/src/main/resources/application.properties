spring.application.name=library_mgmt_demo

# Server (you can keep 8081 for user service)
server.port=8081

spring.datasource.url=jdbc:sqlserver://library-server.database.windows.net:1433;database=userdb;encrypt=true;trustServerCertificate=true;loginTimeout=30;

spring.datasource.username=adminuser
spring.datasource.password=Library@123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.main.lazy-initialization=true